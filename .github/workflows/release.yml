name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject version from tag into manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" bm3_importer/blender_manifest.toml

      - name: Build extension ZIP
        run: cd bm3_importer && zip -r ../bm3_importer.zip blender_manifest.toml __init__.py

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: bm3_importer.zip
          generate_release_notes: true
